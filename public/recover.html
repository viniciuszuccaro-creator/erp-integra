<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar ERP Local</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #475569;
      }
      .status {
        margin-top: 16px;
        font-weight: 700;
        color: #166534;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Recuperando ERP local</h1>
      <p>Limpando dados temporarios e restaurando Grupo, Empresas e Cadastros Gerais locais.</p>
      <p class="status" id="status">Limpando...</p>
    </main>
    <script>
      (async function recover() {
        var status = document.getElementById('status');
        var keys = [
          'erp_integra_local_db_v1',
          'erp_integra_local_user_v1',
          'erp_integra_base44_snapshot_imported_v1',
          'erp_integra_base44_snapshot_imported_v2',
          'erp_integra_base44_snapshot_imported_v3_core',
          'erp_integra_base44_snapshot_imported_v4_core_merged',
          'erp_integra_base44_snapshot_imported_v5_core_compact',
          'contexto_atual',
          'empresa_atual_id',
          'group_atual_id'
        ];

        try {
          keys.forEach(function (key) { localStorage.removeItem(key); });
          sessionStorage.clear();

          status.textContent = 'Carregando snapshot local compacto...';
          var response = await fetch('/base44-local-core-snapshot.json', { cache: 'no-store' });
          if (!response.ok) throw new Error('Snapshot local nao encontrado');
          var snapshot = await response.json();
          var entities = snapshot.entities || {};
          var now = new Date().toISOString();
          var grupos = Array.isArray(entities.GrupoEmpresarial) ? entities.GrupoEmpresarial : [];
          var empresas = Array.isArray(entities.Empresa) ? entities.Empresa : [];
          var grupoId = (grupos[0] && grupos[0].id) || 'local_grupo_cpa';
          var empresaId = (empresas[0] && empresas[0].id) || 'local_empresa_3z';
          var empresaIds = empresas.map(function (empresa) { return empresa && empresa.id; }).filter(Boolean);

          if (!empresaIds.length) empresaIds = [empresaId];

          entities.GrupoEmpresarial = grupos.map(function (grupo) {
            return Object.assign({}, grupo, {
              group_id: grupo.id || grupoId,
              grupo_id: grupo.id || grupoId,
              nome: grupo.nome || grupo.nome_do_grupo || grupo.razao_social_grupo,
              imported_from_base44: true,
              imported_at: now
            });
          });

          entities.Empresa = empresas.map(function (empresa) {
            return Object.assign({}, empresa, {
              group_id: empresa.group_id || empresa.grupo_id || grupoId,
              grupo_id: empresa.grupo_id || empresa.group_id || grupoId,
              grupo_empresarial_id: empresa.grupo_empresarial_id || grupoId,
              imported_from_base44: true,
              imported_at: now
            });
          });

          entities.PerfilAcesso = (entities.PerfilAcesso || []).map(function (perfil) {
            return Object.assign({}, perfil, {
              nome: perfil.nome || perfil.nome_perfil,
              group_id: perfil.group_id || perfil.grupo_id || grupoId,
              grupo_id: perfil.grupo_id || perfil.group_id || grupoId,
              imported_from_base44: true,
              imported_at: now
            });
          });

          var localUser = {
            id: 'local-admin-user',
            email: 'admin@erp-local.test',
            full_name: 'Administrador Local',
            role: 'admin',
            disabled: false,
            is_verified: true,
            contexto_atual: 'grupo',
            empresa_atual_id: empresaId,
            empresa_padrao_id: empresaId,
            grupo_atual_id: grupoId,
            grupo_padrao_id: grupoId,
            pode_operar_em_grupo: true,
            pode_ver_todas_empresas: true,
            empresas_vinculadas: empresaIds.map(function (id) {
              return { empresa_id: id, ativo: true, nivel_acesso: 'Administrador' };
            }),
            grupos_vinculados: [{ grupo_id: grupoId, ativo: true, nivel_acesso: 'Administrador' }],
            created_date: now,
            updated_date: now
          };

          entities.User = [localUser].concat((entities.User || []).filter(function (user) {
            return user && user.id !== localUser.id;
          }));

          localStorage.setItem('erp_integra_local_db_v1', JSON.stringify(entities));
          localStorage.setItem('erp_integra_local_user_v1', JSON.stringify(localUser));
          localStorage.setItem('erp_integra_base44_snapshot_imported_v5_core_compact', snapshot.exported_at || 'core-compact');
          localStorage.setItem('contexto_atual', 'grupo');
          localStorage.setItem('empresa_atual_id', empresaId);
          localStorage.setItem('group_atual_id', grupoId);

          status.textContent = 'Pronto. Abrindo o ERP com dados restaurados...';
          setTimeout(function () { window.location.replace('/cadastros'); }, 800);
        } catch (error) {
          status.textContent = 'Nao foi possivel restaurar automaticamente. Abra em 127.0.0.1:5173/recover.html.';
          console.warn(error);
        }
      })();
    </script>
  </body>
</html>
